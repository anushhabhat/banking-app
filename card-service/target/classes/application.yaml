server:
  port: 8084

spring:
  application:
    name: card-service

  datasource:
    url: jdbc:oracle:thin:@localhost:1521:orcl
    username: hr
    password: hr
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

kafka:
  bootstrap-servers: localhost:9092
  topic:
    cards: cards-topic

